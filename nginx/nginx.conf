server {
    listen 80;

    # Route everything at the root to the frontend container
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route anything under /api to the backend container.
    # No trailing slash on proxy_pass here — this preserves the /api/
    # prefix when forwarding, matching how the Express routes are mounted
    # (e.g. /api/prebuilt). A trailing slash would strip that prefix and
    # break every route.
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
