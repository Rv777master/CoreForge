
name: Build, Validate, and Push Docker Images
 
on:
  push:
    branches:
      - main
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # ---------- Backend ----------
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: coreforge-backend:test
 
      - name: Validate backend image runs
        run: |
          docker run -d --name backend-test -e PORT=5000 -e MONGO_URI=mongodb://invalid:27017/test coreforge-backend:test
          sleep 5
          docker ps --filter "name=backend-test" --filter "status=running" | grep backend-test
          docker logs backend-test
          docker stop backend-test
          docker rm backend-test
 
      # ---------- Frontend ----------
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: coreforge-frontend:test
 
      - name: Validate frontend image runs
        run: |
          docker run -d --name frontend-test -p 8081:80 coreforge-frontend:test
          sleep 3
          docker ps --filter "name=frontend-test" --filter "status=running" | grep frontend-test
          curl -f http://localhost:8081/ || (docker logs frontend-test && exit 1)
          docker stop frontend-test
          docker rm frontend-test
 
      # ---------- Push to Docker Hub (bonus) ----------
      - name: Tag and push backend image
        run: |
          docker tag coreforge-backend:test ${{ secrets.DOCKERHUB_USERNAME }}/coreforge-backend:latest
          docker tag coreforge-backend:test ${{ secrets.DOCKERHUB_USERNAME }}/coreforge-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coreforge-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coreforge-backend:${{ github.sha }}
 
      - name: Tag and push frontend image
        run: |
          docker tag coreforge-frontend:test ${{ secrets.DOCKERHUB_USERNAME }}/coreforge-frontend:latest
          docker tag coreforge-frontend:test ${{ secrets.DOCKERHUB_USERNAME }}/coreforge-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coreforge-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coreforge-frontend:${{ github.sha }}